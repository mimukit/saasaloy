# pnpm 11 workspace + settings (camelCase; .npmrc is auth/registry-only).
packages:
  - "apps/*"
  - "packages/*"

# Pin exact versions so manifest and lockfile agree.
saveExact: true
# Supply-chain cooldown (minutes): don't install versions younger than 3 days.
minimumReleaseAge: 4320
# Fail installs when Node/pnpm don't satisfy `engines`.
engineStrict: true
# Collapse duplicate peer installs across the monorepo.
dedupePeerDependents: true

# Dependencies allowed to run install/build scripts (pnpm 11 blocks by default).
allowBuilds:
  esbuild: true
  workerd: true
  sharp: true
